name: Build Android

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.0'

    - name: Download and setup OpenCV Android SDK
      run: |
        cd openCVLibrary480
        curl -L -o opencv.zip https://github.com/opencv/opencv/releases/download/4.8.0/opencv-4.8.0-android-sdk.zip
        unzip -q opencv.zip
        ls -la OpenCV-android-sdk/
        ls -la OpenCV-android-sdk/sdk/
        ls -la OpenCV-android-sdk/sdk/java/
        mkdir -p src/main/java
        cp -r OpenCV-android-sdk/sdk/java/src/* src/main/java/ || cp -r OpenCV-android-sdk/sdk/java/* src/main/java/
        mkdir -p src/main/jniLibs
        cp -r OpenCV-android-sdk/sdk/native/libs/* src/main/jniLibs/
        ls -la src/main/
        ls -la src/main/java/
        ls -la src/main/jniLibs/
        rm -rf opencv.zip OpenCV-android-sdk

    - name: Build with Gradle
      run: gradle build --stacktrace
