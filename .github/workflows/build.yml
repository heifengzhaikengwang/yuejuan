name: Build Android

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.0'

    - name: Download and setup OpenCV Android SDK
      run: |
        rm -rf openCVLibrary480
        curl -L -o opencv.zip https://github.com/opencv/opencv/releases/download/4.8.0/opencv-4.8.0-android-sdk.zip
        unzip -q opencv.zip
        mv OpenCV-android-sdk/sdk openCVLibrary480
        rm -rf opencv.zip OpenCV-android-sdk
        # Add namespace to OpenCV build.gradle
        sed -i 's/android {/android {\n    namespace "org.opencv"/' openCVLibrary480/build.gradle

    - name: Build with Gradle
      run: gradle build --stacktrace
